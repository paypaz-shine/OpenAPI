<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #e7f0fa;
    color: #000924;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    text-align: center;
    max-width: 560px;
  }
  .logo { margin-bottom: 40px; }
  h1 {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  p.desc {
    font-size: 15px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 56px;
  }
  .btn {
    display: inline-block;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    padding: 11px 30px;
    border-radius: 30px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: #435ddd; color: #ffffff; }
  footer {
    font-size: 13px;
    color: #999;
  }
  footer a { color: #666; text-decoration: underline; }
</style>
