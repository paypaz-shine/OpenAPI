<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deposit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      color: #303133;
      background: #F5F7FA;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #EBEEF5;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-row   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .header-title { font-size: 18px; font-weight: 500; color: #303133; }
    .lang-btn {
      font-size: 12px; color: #409EFF;
      background: none; border: 1px solid #C6E2FF;
      border-radius: 4px; padding: 2px 8px; line-height: 1.5;
      cursor: pointer; white-space: nowrap;
      transition: background .2s, border-color .2s;
    }
    .lang-btn:hover { background: #ecf5ff; border-color: #409EFF; }
    .header-info  { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
    .info-row     { display: flex; justify-content: space-between; align-items: center; }
    .info-label   { font-size: 12px; color: #909399; }
    .info-val     { font-size: 13px; color: #606266; }
    .info-amount  { color: #303133; font-weight: 500; }

    /* ── Content ── */
    .content { padding: 20px 12px 28px; flex: 1; }

    /* ── Step Card ── */
    .step-card {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,.06);
    }
    .step-head {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 0;
      margin-bottom: 10px;
    }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: #E03A3A; color: #fff;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-title { font-size: 15px; font-weight: 500; color: #303133; }
    .step-body  { padding: 0 16px 16px; }

    /* ── Select Wrapper & Box ── */
    .sel-wrap { position: relative; }

    .sel-box {
      border: 1px solid #DCDFE6;
      border-radius: 4px;
      height: 40px;
      padding: 0 12px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      background: #fff;
      user-select: none;
      transition: border-color .2s cubic-bezier(.645,.045,.355,1);
    }
    .sel-box:hover  { border-color: #C0C4CC; }
    .sel-box.open   { border-color: #409EFF; }

    .sel-left  { display: flex; align-items: center; gap: 8px; }
    .sel-label { font-size: 14px; color: #303133; }

    .tok-icon {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .tok-icon svg { width: 24px; height: 24px; display: block; }

    .sel-caret {
      color: #C0C4CC;
      display: flex; align-items: center;
      transition: transform .3s cubic-bezier(.645,.045,.355,1);
      flex-shrink: 0;
    }
    .sel-box.open .sel-caret { transform: rotate(180deg); color: #409EFF; }
    .sel-caret svg { width: 14px; height: 14px; }

    /* ── Dropdown Panel ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #E4E7ED;
      border-radius: 4px;
      box-shadow: 0 2px 12px 0 rgba(0,0,0,.1);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: max-height .25s cubic-bezier(.645,.045,.355,1), opacity .2s ease;
      z-index: 100;
    }
    .dropdown.open {
      max-height: 220px;
      opacity: 1;
      pointer-events: auto;
    }
    .dd-inner { padding: 6px 0; }

    .opt {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      height: 40px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .opt:hover { background: #F5F7FA; }
    .opt.selected { color: #409EFF; }
    .opt-label { font-size: 14px; flex: 1; }
    .opt-check {
      color: #409EFF;
      opacity: 0;
      display: flex;
      transition: opacity .15s;
    }
    .opt.selected .opt-check { opacity: 1; }
    .opt-check svg { width: 14px; height: 14px; }

    /* ── Detail Block ── */
    .detail-wrap {
      background: #F5F7FA;
      border-radius: 6px;
      padding: 14px 12px 0;
    }
    .detail-inner {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding-bottom: 14px;
    }
    .qr-wrap {
      background: #fff;
      border: 1px solid #EBEEF5;
      border-radius: 6px;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      padding: 4px;
    }
    canvas#qr { display: block; }

    .addr-block { width: 100%; min-width: 0; }
    .addr-label { font-size: 12px; color: #909399; margin-bottom: 6px; }
    .addr-row   { display: flex; align-items: flex-start; gap: 8px; }
    .addr-text  {
      font-size: 13px; color: #303133;
      word-break: break-all; line-height: 1.6; flex: 1;
    }
    .copy-btn {
      flex-shrink: 0;
      width: 30px; height: 30px;
      border: 1px solid #DCDFE6; border-radius: 4px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #909399; margin-top: 1px;
      transition: color .2s, border-color .2s, background .2s;
    }
    .copy-btn:hover  { border-color: #409EFF; color: #409EFF; }
    .copy-btn:active { background: #ecf5ff; }
    .copy-btn svg { width: 15px; height: 15px; }

    .min-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0 12px;
      font-size: 12px; color: #909399;
      border-top: 1px solid #EBEEF5; margin-top: 2px;
    }
    .min-val { color: #E03A3A; font-weight: 500; }

    /* ── Network Tag ── */
    .net-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 11px; font-weight: 500;
      margin-top: 6px;
    }
    .net-tag-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── Warning ── */
    .warning {
      display: flex; gap: 8px;
      background: #fdf6ec; border-radius: 6px;
      padding: 10px 12px; margin-top: 4px;
      border-left: 3px solid #E6A23C;
    }
    .warning-icon { flex-shrink: 0; color: #E6A23C; margin-top: 1px; }
    .warning-icon svg { width: 15px; height: 15px; }
    .warning-text { font-size: 12px; color: #909399; line-height: 1.7; }

    /* ── Toast ── */
    .toast {
      position: fixed; left: 50%; bottom: 80px;
      transform: translateX(-50%) translateY(12px);
      background: rgba(0,0,0,.72); color: #fff;
      font-size: 13px; padding: 8px 18px;
      border-radius: 20px; white-space: nowrap;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Divider ── */
    .dd-divider { height: 1px; background: #EBEEF5; margin: 4px 0; }

    @media (min-width: 520px) {
      .page { border-left: 1px solid #EBEEF5; border-right: 1px solid #EBEEF5; }
    }
  </style>
</head>
<body>

<div class="page">

            <div class="dd-inner" id="networkOptions"></div>
          </div>
        </div>

    </div>

    <!-- Step 3: Detail -->

      <div class="step-head">

      </div>

          <div class="detail-inner">
            <div class="qr-wrap">

            </div>

                       stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                </button>
              </div>
              <div id="netTag"></div>
            </div>
          </div>
          <div class="min-row">
            <span id="t-minLabel">Minimum Deposit:</span>
            <span class="min-val" id="minAmount"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Warning -->
    <div class="warning">
      <span class="warning-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E6A23C" stroke-width="2" stroke-linecap="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>

    </div>

  </div>
</div>

<div class="toast" id="toast">Address copied</div>

// ── Render ────────────────────────────────────────────────────────────
function renderTokenSelector() {

  const iconEl = document.getElementById('tokenIcon');
  iconEl.style.background = '';
  iconEl.innerHTML = t.svg;
  document.getElementById('tokenLabel').textContent = t.label;

  const container = document.getElementById('tokenOptions');
  container.innerHTML = TOKENS.map(tok => `
    <div class="opt ${tok.id === currentToken ? 'selected' : ''}"
         onclick="selectToken('${tok.id}')">
      <div class="tok-icon">${tok.svg}</div>
      <span class="opt-label">${tok.label}</span>
      <span class="opt-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
    </div>
  `).join('');
}

function renderNetworkSelector() {
  const n = NETWORKS.find(x => x.id === currentNetwork);
  const netIconEl = document.getElementById('networkIcon');
  netIconEl.style.cssText = '';
  netIconEl.innerHTML = n.svg;
  document.getElementById('networkLabel').textContent = n.label;

  const container = document.getElementById('networkOptions');
  container.innerHTML = NETWORKS.map(net => `
    <div class="opt ${net.id === currentNetwork ? 'selected' : ''}"
         onclick="selectNetwork('${net.id}')">
      <div class="tok-icon">${net.svg}</div>
      <span class="opt-label">${net.label}</span>
      <span class="opt-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </span>
    </div>
  `).join('');
}

function renderDetail() {
  const key  = `${currentToken}-${currentNetwork}`;
  const addr = ADDRESSES[key] || '';
  const net  = NETWORKS.find(x => x.id === currentNetwork);

  document.getElementById('addrText').textContent = addr;
  document.getElementById('minAmount').textContent = MIN_AMOUNTS[key] || '';
  document.getElementById('amountDisplay').textContent = `100 ${currentToken}`;

  document.getElementById('netTag').innerHTML = `
    <div class="net-tag" style="background:${net.tagBg};color:${net.tagColor}">
      <div class="net-tag-dot" style="background:${net.tagColor}"></div>
      ${net.tag}
    </div>
  `;

  drawQR(addr);
}

function renderAll() {
  renderTokenSelector();
  renderNetworkSelector();
  renderDetail();
}

// ── Dropdown ──────────────────────────────────────────────────────────
function toggleDropdown(which) {
  if (openDropdown === which) {
    closeAll();
    return;
  }
  closeAll();
  openDropdown = which;
  document.getElementById(which + 'Box').classList.add('open');
  document.getElementById(which + 'Dropdown').classList.add('open');
}

function closeAll() {
  ['token', 'network'].forEach(w => {
    document.getElementById(w + 'Box').classList.remove('open');
    document.getElementById(w + 'Dropdown').classList.remove('open');
  });
  openDropdown = null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.sel-wrap')) closeAll();
});

// ── Select actions ────────────────────────────────────────────────────
function selectToken(id) {
  currentToken = id;
  closeAll();
  renderAll();
}

function selectNetwork(id) {
  currentNetwork = id;
  closeAll();
  renderAll();
}

// ── QR Code ───────────────────────────────────────────────────────────
function drawQR(address) {
  const canvas = document.getElementById('qr');
  const ctx    = canvas.getContext('2d');
  const S = 112, M = 25, C = S / M;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, S, S);

  let h = 5381;
  for (let i = 0; i < address.length; i++) h = ((h << 5) + h + address.charCodeAt(i)) >>> 0;

  function rand(r, c) {
    let v = (h ^ (r * 374761393 + c * 668265263)) >>> 0;
    v = ((v >> 13) ^ v) >>> 0;
    v = (v * 1274126177) >>> 0;
    return (v >>> 16) & 1;
  }
  function isTiming(r, c) {
    return (r === 6 && c >= 8 && c <= M - 9) || (c === 6 && r >= 8 && r <= M - 9);
  }
  function isFinderZone(r, c) {
    return (r < 9 && c < 9) || (r < 9 && c > M - 9) || (r > M - 9 && c < 9);
  }
  function finder(ox, oy) {
    ctx.fillStyle = '#111';
    ctx.fillRect(ox * C, oy * C, 7 * C, 7 * C);
    ctx.fillStyle = '#fff';
    ctx.fillRect((ox + 1) * C, (oy + 1) * C, 5 * C, 5 * C);
    ctx.fillStyle = '#111';
    ctx.fillRect((ox + 2) * C, (oy + 2) * C, 3 * C, 3 * C);
  }

  ctx.fillStyle = '#111';
  for (let r = 0; r < M; r++) {
    for (let c = 0; c < M; c++) {
      if (isFinderZone(r, c)) continue;
      if (isTiming(r, c)) {
        if ((r === 6 ? c : r) % 2 === 0) ctx.fillRect(c * C, r * C, C, C);
        continue;
      }
      if (rand(r, c)) ctx.fillRect(c * C, r * C, C, C);
    }
  }
  finder(0, 0); finder(M - 7, 0); finder(0, M - 7);

  const ap = M - 9;
  ctx.fillStyle = '#111'; ctx.fillRect(ap * C, ap * C, 5 * C, 5 * C);
  ctx.fillStyle = '#fff'; ctx.fillRect((ap+1)*C,(ap+1)*C,3*C,3*C);
  ctx.fillStyle = '#111'; ctx.fillRect((ap+2)*C,(ap+2)*C,C,C);
}

// ── Copy ──────────────────────────────────────────────────────────────
function copyAddr() {
  const txt = document.getElementById('addrText').textContent.trim();
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(txt).then(showToast);
  } else {
    const el = document.createElement('textarea');
    el.value = txt;
    el.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast();
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ──────────────────────────────────────────────────────────────
renderAll();
applyLang();
</script>
